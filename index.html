<!DOCTYPE html>

<head>

    <title>Narangstudio | Official</title>
    <style>
        body { font-family: sans-serif; background-color: #080d08; color: #e0e0e0; text-align: center; margin: 0; padding: 0; }
        header { background: #142114; padding: 40px; border-bottom: 2px solid #2ecc71; }
        h1 { color: #2ecc71; margin: 0; letter-spacing: 2px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #121c12; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #1e331e; }
        img, video { width: 100%; border-radius: 10px; }
        .download-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #2ecc71; color: #000; text-decoration: none; font-weight: bold; border-radius: 5px; }
        .yt-btn { display: inline-block; margin-top: 20px; padding: 15px 25px; background: #ff0000; color: #fff; text-decoration: none; border-radius: 30px; font-weight: bold; }

<body>

    <header>
        <h1>Narangstudio</h1>

        <p style="font-size: 0.8rem; color: #2ecc71;">By Supun Nirmal Weerasingha</p>

    <div class="container">

        <a href="ඔයාගේ_YouTube_Link_එක" target="_blank" class="yt-btn">Subscribe on YouTube</a>

    <footer style="padding: 20px; font-size: 0.7rem; color: #555;">
        &copy; 2026 Narangstudio - Supun Nirmal Weerasingha
